<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexTrade - Advanced Stock Portfolio Simulator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script>
      Babel.registerPreset("custom-react", {
        presets: [
          [Babel.availablePresets["react"], { runtime: "classic" }]
        ]
      });
    </script>
    <!-- Google Identity Services (OAuth) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #0b0f19 0%, #030712 100%);
            color: #f3f4f6;
        }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        }
        .glow-indigo {
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div id="root"></div>

    <script type="text/babel" data-presets="custom-react">
        const { useState, useEffect } = React;

        // JWT decoder helper for Google Sign-In Token
        function decodeJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                console.error("JWT decoding failed:", e);
                return null;
            }
        }

        // SVG Interactive Line Chart for historical price trend mapping
        function PriceChart({ symbol, prices }) {
            if (!prices || prices.length < 2) {
                return (
                    <div className="flex flex-col items-center justify-center h-48 text-slate-500 bg-slate-950/40 rounded-2xl border border-slate-800/80">
                        <svg className="w-8 h-8 text-indigo-500/40 mb-2 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                        </svg>
                        <span className="text-xs font-semibold uppercase tracking-wider">Awaiting simulation ticks ({prices ? prices.length : 0}/10)...</span>
                    </div>
                );
            }

            const width = 500;
            const height = 200;
            const paddingX = 40;
            const paddingY = 25;

            const minPrice = Math.min(...prices) * 0.998;
            const maxPrice = Math.max(...prices) * 1.002;
            const range = maxPrice - minPrice || 1;

            const points = prices.map((price, idx) => {
                const x = paddingX + (idx * (width - 2 * paddingX)) / (prices.length - 1);
                const y = height - paddingY - ((price - minPrice) / range) * (height - 2 * paddingY);
                return { x, y, price };
            });

            const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
            const areaD = `${pathD} L ${points[points.length - 1].x} ${height - paddingY} L ${points[0].x} ${height - paddingY} Z`;

            return (
                <div className="relative glass-panel rounded-2xl p-4 border border-slate-800">
                    <div className="flex justify-between items-center mb-3">
                        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">{symbol} Trend History</span>
                        <span className="text-[10px] bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">Live (10 ticks)</span>
                    </div>
                    <svg className="w-full h-auto" viewBox={`0 0 ${width} ${height}`}>
                        <defs>
                            <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="#6366f1" stopOpacity="0.35" />
                                <stop offset="100%" stopColor="#6366f1" stopOpacity="0.0" />
                            </linearGradient>
                        </defs>
                        {/* Grid lines */}
                        <line x1={paddingX} y1={paddingY} x2={width - paddingX} y2={paddingY} stroke="rgba(255,255,255,0.05)" strokeDasharray="3" />
                        <line x1={paddingX} y1={(height) / 2} x2={width - paddingX} y2={(height) / 2} stroke="rgba(255,255,255,0.03)" strokeDasharray="3" />
                        <line x1={paddingX} y1={height - paddingY} x2={width - paddingX} y2={height - paddingY} stroke="rgba(255,255,255,0.08)" />

                        {/* Area Gradient */}
                        <path d={areaD} fill="url(#chartGrad)" />

                        {/* Chart Path Line */}
                        <path d={pathD} fill="none" stroke="#6366f1" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />

                        {/* Point Circles */}
                        {points.map((p, idx) => (
                            <g key={idx} className="group">
                                <circle 
                                    cx={p.x} 
                                    cy={p.y} 
                                    r="4" 
                                    fill="#6366f1" 
                                    stroke="#0b0f19" 
                                    strokeWidth="1.5" 
                                />
                                <text 
                                    x={p.x} 
                                    y={p.y - 8} 
                                    fill="#f1f5f9" 
                                    fontSize="8" 
                                    fontWeight="bold"
                                    textAnchor="middle" 
                                    className="opacity-0 group-hover:opacity-100 transition-opacity duration-150 bg-slate-900 px-1 rounded pointer-events-none"
                                >
                                    ${p.price.toFixed(2)}
                                </text>
                            </g>
                        ))}

                        {/* Y-axis Labels */}
                        <text x={paddingX - 8} y={paddingY + 3} fill="#64748b" fontSize="8" fontWeight="bold" textAnchor="end">${maxPrice.toFixed(2)}</text>
                        <text x={paddingX - 8} y={height - paddingY + 3} fill="#64748b" fontSize="8" fontWeight="bold" textAnchor="end">${minPrice.toFixed(2)}</text>

                        {/* X-axis tick labels */}
                        {points.map((p, idx) => (
                            <text key={idx} x={p.x} y={height - paddingY + 14} fill="#64748b" fontSize="8" textAnchor="middle">
                                t-{points.length - 1 - idx}
                            </text>
                        ))}
                    </svg>
                </div>
            );
        }

        // SVG Donut Chart representing Cash vs Stocks asset values
        function AllocationDonutChart({ cash, holdings, stocks }) {
            const data = [
                { name: "Cash", value: cash, color: "#64748b" }
            ];

            holdings.forEach(h => {
                const currentPrice = stocks.find(s => s.symbol === h.symbol)?.price || h.averageCost;
                const value = currentPrice * h.sharesOwned;
                if (value > 0) {
                    const colors = {
                        AAPL: "#38bdf8", // cyan
                        MSFT: "#818cf8", // indigo
                        GOOG: "#f43f5e", // rose
                        AMZN: "#fb923c", // orange
                        TSLA: "#10b981"  // emerald
                    };
                    data.push({
                        name: h.symbol,
                        value: value,
                        color: colors[h.symbol] || "#a855f7" // purple
                    });
                }
            });

            const total = data.reduce((sum, item) => sum + item.value, 0);
            if (total === 0) return null;

            let cumulativePercent = 0;
            const coordinates = data.map(item => {
                const percent = item.value / total;
                const startPercent = cumulativePercent;
                cumulativePercent += percent;

                const getCoordinatesForPercent = (percent) => {
                    const x = Math.cos(2 * Math.PI * percent - Math.PI / 2);
                    const y = Math.sin(2 * Math.PI * percent - Math.PI / 2);
                    return [x, y];
                };

                const [startX, startY] = getCoordinatesForPercent(startPercent);
                const [endX, endY] = getCoordinatesForPercent(cumulativePercent);
                const largeArcFlag = percent > 0.5 ? 1 : 0;

                const r_outer = 50;
                const r_inner = 34;
                const cx = 60;
                const cy = 60;

                const pathData = percent === 1 ?
                    `M ${cx} ${cy - r_outer} A ${r_outer} ${r_outer} 0 1 1 ${cx - 0.01} ${cy - r_outer} Z M ${cx} ${cy - r_inner} A ${r_inner} ${r_inner} 0 1 1 ${cx - 0.01} ${cy - r_inner} Z` :
                    `M ${cx + startX * r_outer} ${cy + startY * r_outer}
                     A ${r_outer} ${r_outer} 0 ${largeArcFlag} 1 ${cx + endX * r_outer} ${cy + endY * r_outer}
                     L ${cx + endX * r_inner} ${cy + endY * r_inner}
                     A ${r_inner} ${r_inner} 0 ${largeArcFlag} 0 ${cx + startX * r_inner} ${cy + startY * r_inner}
                     Z`;

                return {
                    ...item,
                    percent: percent * 100,
                    pathData
                };
            });

            return (
                <div className="flex flex-col md:flex-row items-center justify-around gap-8 p-6 bg-slate-950/20 rounded-2xl border border-slate-800/80">
                    <div className="relative w-40 h-40">
                        <svg viewBox="0 0 120 120" className="w-full h-full transform -rotate-90">
                            {coordinates.map((item, idx) => (
                                <path 
                                    key={idx}
                                    d={item.pathData}
                                    fill={item.color}
                                    className="transition-all duration-300 hover:opacity-85"
                                />
                            ))}
                            <circle cx="60" cy="60" r="33" fill="#030712" />
                        </svg>
                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                            <span className="text-[9px] text-slate-500 uppercase tracking-widest font-extrabold">Net Assets</span>
                            <span className="text-sm font-extrabold text-slate-200">${total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                        </div>
                    </div>

                    <div className="flex-grow space-y-3 w-full">
                        <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Asset Composition</h4>
                        {coordinates.map((item, idx) => (
                            <div key={idx} className="flex items-center justify-between text-xs border-b border-slate-900/60 pb-1.5">
                                <div className="flex items-center gap-2">
                                    <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: item.color }}></span>
                                    <span className="font-bold text-slate-300">{item.name}</span>
                                </div>
                                <div className="text-right">
                                    <span className="font-extrabold text-slate-200">${item.value.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                    <span className="text-[10px] text-slate-500 font-semibold ml-2">({item.percent.toFixed(1)}%)</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function Login({ onLogin }) {
            const handleGuestLogin = () => {
                onLogin({
                    name: "Guest Investor",
                    email: "guest@apextrade.io",
                    picture: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80",
                    isGuest: true
                });
            };

            useEffect(() => {
                window.handleCredentialResponse = (response) => {
                    const user = decodeJwt(response.credential);
                    if (user) {
                        onLogin({
                            name: user.name,
                            email: user.email,
                            picture: user.picture,
                            isGuest: false
                        });
                    }
                };
            }, [onLogin]);

            return (
                <div className="flex items-center justify-center min-h-[85vh] px-4">
                    <div className="glass-panel rounded-3xl p-10 max-w-md w-full border-t border-indigo-500/20 text-center relative overflow-hidden">
                        <div className="absolute -top-24 -left-24 w-48 h-48 bg-indigo-500/10 rounded-full blur-3xl"></div>
                        <div className="absolute -bottom-24 -right-24 w-48 h-48 bg-purple-500/10 rounded-full blur-3xl"></div>

                        <div className="w-16 h-16 bg-gradient-to-tr from-cyan-500 to-indigo-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-500/20">
                            <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                            </svg>
                        </div>

                        <h1 className="text-2xl font-extrabold tracking-wider text-slate-100 mb-2">APEXTRADE</h1>
                        <p className="text-xs text-slate-400 mb-8 font-semibold tracking-wider">Real-time Stock Trading Simulator</p>

                        <div className="space-y-4">
                            <div className="flex justify-center">
                                <div id="g_id_onload"
                                     data-client_id="855919652758-om1b3kpg3hbfbfl4b5o89s56oas58fl7.apps.googleusercontent.com"
                                     data-context="signin"
                                     data-ux_mode="popup"
                                     data-callback="handleCredentialResponse"
                                     data-auto_prompt="false">
                                </div>
                                <div className="g_id_signin"
                                     data-type="standard"
                                     data-shape="pill"
                                     data-theme="filled_black"
                                     data-text="signin_with"
                                     data-size="large"
                                     data-logo_alignment="left">
                                </div>
                            </div>

                            <div className="flex items-center my-4">
                                <div className="flex-grow border-t border-slate-800"></div>
                                <span className="mx-4 text-xs text-slate-500 font-bold uppercase tracking-wider">or</span>
                                <div className="flex-grow border-t border-slate-800"></div>
                            </div>

                            <button 
                                onClick={handleGuestLogin}
                                className="w-full py-3 bg-slate-900 border border-slate-800 text-slate-200 font-bold rounded-full hover:bg-slate-800 transition duration-200 shadow-md hover:border-slate-700 flex items-center justify-center gap-2"
                            >
                                <svg className="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                                Continue as Guest
                            </button>
                        </div>

                        <div className="mt-8 text-[11px] text-slate-500 leading-relaxed">
                            Sign in to access live stock markets, manage multi-asset portfolios, and record transaction history.
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [userProfile, setUserProfile] = useState(null);

            const [stocks, setStocks] = useState([]);
            const [portfolio, setPortfolio] = useState({ cash: 10000, holdingsValue: 0, portfolioValue: 10000, profitLoss: 0, profitLossPercent: 0, holdings: [] });
            const [transactions, setTransactions] = useState([]);
            const [selectedSymbol, setSelectedSymbol] = useState('');
            const [quantity, setQuantity] = useState('10');
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('market'); // market | analytics | logs

            // Watchlist configuration
            const [watchlist, setWatchlist] = useState(() => {
                const saved = localStorage.getItem("apex_trade_watchlist");
                return saved ? JSON.parse(saved) : ["AAPL", "MSFT"];
            });
            const [showWatchlistOnly, setShowWatchlistOnly] = useState(false);

            // Price history history tracker (stores up to last 10 ticks for each symbol)
            const [priceHistory, setPriceHistory] = useState({});

            useEffect(() => {
                const session = localStorage.getItem("apex_trade_session");
                if (session) {
                    const profile = JSON.parse(session);
                    setUserProfile(profile);
                    setIsLoggedIn(true);
                }
                fetchInitialData();

                // Simulation loop every 2.5 seconds
                const interval = setInterval(() => {
                    simulateMarket();
                }, 2500);

                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                localStorage.setItem("apex_trade_watchlist", JSON.stringify(watchlist));
            }, [watchlist]);

            const fetchInitialData = async () => {
                try {
                    const stocksRes = await fetch('/api/trading/stocks');
                    const stocksData = await stocksRes.json();
                    setStocks(stocksData);
                    
                    if (stocksData.length > 0) {
                        setSelectedSymbol(stocksData[0].symbol);
                        
                        // Seed initial price in history if empty
                        setPriceHistory(prev => {
                            const next = { ...prev };
                            stocksData.forEach(s => {
                                if (!next[s.symbol]) {
                                    next[s.symbol] = [s.price];
                                }
                            });
                            return next;
                        });
                    }

                    const portfolioRes = await fetch('/api/trading/portfolio');
                    const portfolioData = await portfolioRes.json();
                    setPortfolio(portfolioData);

                    const transactionsRes = await fetch('/api/trading/transactions');
                    const transactionsData = await transactionsRes.json();
                    setTransactions(transactionsData);

                    setLoading(false);
                } catch (err) {
                    console.error("Error fetching trading data:", err);
                    setLoading(false);
                }
            };

            const simulateMarket = async () => {
                try {
                    const res = await fetch('/api/trading/simulate', { method: 'POST' });
                    const updatedStocks = await res.json();
                    setStocks(updatedStocks);

                    // Add simulation ticks to price history
                    setPriceHistory(prev => {
                        const next = { ...prev };
                        updatedStocks.forEach(s => {
                            const history = prev[s.symbol] ? [...prev[s.symbol]] : [];
                            history.push(s.price);
                            if (history.length > 10) {
                                history.shift();
                            }
                            next[s.symbol] = history;
                        });
                        return next;
                    });

                    const portfolioRes = await fetch('/api/trading/portfolio');
                    const portfolioData = await portfolioRes.json();
                    setPortfolio(portfolioData);
                } catch (err) {
                    console.error("Error simulating market:", err);
                }
            };

            const handleLogin = (profile) => {
                setUserProfile(profile);
                setIsLoggedIn(true);
                localStorage.setItem("apex_trade_session", JSON.stringify(profile));
            };

            const handleSignOut = () => {
                setUserProfile(null);
                setIsLoggedIn(false);
                localStorage.removeItem("apex_trade_session");
            };

            const toggleWatchlist = (symbol, e) => {
                e.stopPropagation();
                if (watchlist.includes(symbol)) {
                    setWatchlist(watchlist.filter(s => s !== symbol));
                } else {
                    setWatchlist([...watchlist, symbol]);
                }
            };

            const handleTrade = async (type) => {
                if (!quantity.trim()) return;
                const qty = parseInt(quantity);
                if (isNaN(qty) || qty <= 0) {
                    alert("Please enter a positive integer for quantity.");
                    return;
                }

                try {
                    const params = new URLSearchParams();
                    params.append('symbol', selectedSymbol);
                    params.append('quantity', qty);
                    params.append('type', type);

                    const res = await fetch(`/api/trading/trade?${params.toString()}`, {
                        method: 'POST'
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        alert(data.message);
                        setQuantity('10');
                        fetchInitialData();
                    } else {
                        alert(data.message);
                    }
                } catch (err) {
                    console.error("Error executing trade:", err);
                }
            };

            if (!isLoggedIn) {
                return <Login onLogin={handleLogin} />;
            }

            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500"></div>
                    </div>
                );
            }

            // Filter stocks by watchlist if requested
            const filteredStocks = stocks.filter(s => !showWatchlistOnly || watchlist.includes(s.symbol));

            return (
                <div className="max-w-6xl mx-auto">
                    {/* Header */}
                    <div className="glass-panel rounded-3xl p-6 mb-8 flex flex-col md:flex-row items-center justify-between gap-4 border-t border-indigo-500/20">
                        <div className="text-center md:text-left">
                            <h1 className="text-2xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400">APEXTRADE TERMINAL</h1>
                            <p className="text-[10px] font-semibold text-slate-400 uppercase tracking-widest">Real-time Stock Trading Simulator</p>
                        </div>
                        
                        <div className="flex items-center gap-4 bg-slate-950/40 px-4 py-2.5 rounded-2xl border border-slate-800/80">
                            <img src={userProfile.picture} referrerPolicy="no-referrer" className="w-8 h-8 rounded-full border border-indigo-500/30 object-cover" />
                            <div className="text-left">
                                <div className="text-xs font-bold text-slate-200 leading-tight">{userProfile.name}</div>
                                <div className="text-[9px] text-slate-500 leading-tight">{userProfile.email}</div>
                            </div>
                            <button 
                                onClick={handleSignOut}
                                className="ml-2 text-[10px] font-bold text-rose-400 bg-rose-500/10 hover:bg-rose-500/20 px-2.5 py-1.5 rounded-lg transition"
                            >
                                Sign Out
                            </button>
                        </div>
                    </div>

                    {/* Balance Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div className="glass-panel rounded-2xl p-6 flex flex-col items-center justify-center border-l-4 border-slate-600">
                            <span className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Available Cash</span>
                            <span className="text-3xl font-extrabold text-slate-200">
                                ${portfolio.cash ? portfolio.cash.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) : "0.00"}
                            </span>
                        </div>
                        <div className="glass-panel rounded-2xl p-6 flex flex-col items-center justify-center border-l-4 border-indigo-500">
                            <span className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Portfolio Value</span>
                            <span className="text-3xl font-extrabold text-indigo-400 glow-indigo">
                                ${portfolio.portfolioValue ? portfolio.portfolioValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) : "0.00"}
                            </span>
                        </div>
                        <div className="glass-panel rounded-2xl p-6 flex flex-col items-center justify-center border-l-4 border-emerald-500">
                            <span className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Net Profit / Loss</span>
                            <span className={`text-2xl font-extrabold ${portfolio.profitLoss >= 0 ? "text-emerald-400" : "text-rose-400"}`}>
                                {portfolio.profitLoss >= 0 ? "+" : ""}${portfolio.profitLoss ? portfolio.profitLoss.toFixed(2) : "0.00"}
                            </span>
                            <span className={`text-xs font-semibold mt-1 ${portfolio.profitLoss >= 0 ? "text-emerald-500" : "text-rose-500"}`}>
                                ({portfolio.profitLossPercent ? portfolio.profitLossPercent.toFixed(2) : "0.00"}%)
                            </span>
                        </div>
                    </div>

                    {/* Navigation Tabs */}
                    <div className="flex gap-4 mb-8">
                        <button 
                            onClick={() => setActiveTab('market')}
                            className={`px-5 py-3 text-sm font-bold rounded-xl transition duration-200 flex items-center gap-2 ${activeTab === 'market' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/25' : 'glass-panel text-slate-300 hover:bg-slate-800/40'}`}
                        >
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                            </svg>
                            Live Market Console
                        </button>
                        <button 
                            onClick={() => setActiveTab('analytics')}
                            className={`px-5 py-3 text-sm font-bold rounded-xl transition duration-200 flex items-center gap-2 ${activeTab === 'analytics' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/25' : 'glass-panel text-slate-300 hover:bg-slate-800/40'}`}
                        >
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 3.055A9.003 9.003 0 1020.945 13H11V3.055z" />
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
                            </svg>
                            Portfolio Analytics
                        </button>
                        <button 
                            onClick={() => setActiveTab('logs')}
                            className={`px-5 py-3 text-sm font-bold rounded-xl transition duration-200 flex items-center gap-2 ${activeTab === 'logs' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/25' : 'glass-panel text-slate-300 hover:bg-slate-800/40'}`}
                        >
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            Transaction Audit Ledger
                        </button>
                    </div>

                    {/* Tab 1: Live Market Console */}
                    {activeTab === 'market' && (
                        <div>
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
                                {/* Market Ticker (2 Cols) */}
                                <div className="glass-panel rounded-2xl p-6 lg:col-span-2 border-t border-slate-800">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 pb-2 border-b border-slate-800 gap-4">
                                        <div>
                                            <h2 className="text-lg font-bold text-indigo-300">Live Stock Ticker</h2>
                                            <p className="text-[10px] text-slate-500 uppercase font-semibold">Select a row to display price history chart</p>
                                        </div>
                                        
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs font-semibold text-slate-400">View:</span>
                                            <div className="flex bg-slate-950/80 p-0.5 rounded-lg border border-slate-800">
                                                <button 
                                                    onClick={() => setShowWatchlistOnly(false)}
                                                    className={`px-3 py-1 text-xs font-bold rounded-md transition ${!showWatchlistOnly ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}
                                                >
                                                    All Assets
                                                </button>
                                                <button 
                                                    onClick={() => setShowWatchlistOnly(true)}
                                                    className={`px-3 py-1 text-xs font-bold rounded-md transition ${showWatchlistOnly ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}
                                                >
                                                    Watchlist
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="text-slate-400 font-semibold text-xs border-b border-slate-800/85 uppercase tracking-wider">
                                                    <th className="py-3 px-3 text-center w-10">Watch</th>
                                                    <th className="py-3 px-3">Symbol</th>
                                                    <th className="py-3 px-3">Company</th>
                                                    <th className="py-3 px-3 text-center">Price</th>
                                                    <th className="py-3 px-3 text-right">Day Change</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {filteredStocks.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="5" className="text-center py-10 text-slate-500 text-sm font-medium">
                                                            No stocks in watchlist. Highlight the star symbol to add assets here.
                                                        </td>
                                                    </tr>
                                                ) : (
                                                    filteredStocks.map((stock) => (
                                                        <tr 
                                                            key={stock.symbol} 
                                                            onClick={() => setSelectedSymbol(stock.symbol)}
                                                            className={`border-b border-slate-800/50 hover:bg-slate-800/25 transition cursor-pointer ${selectedSymbol === stock.symbol ? 'bg-indigo-600/10 border-indigo-500/35' : ''}`}
                                                        >
                                                            <td className="py-3.5 px-3 text-center">
                                                                <button 
                                                                    onClick={(e) => toggleWatchlist(stock.symbol, e)}
                                                                    className="text-slate-500 hover:text-amber-400 transition"
                                                                >
                                                                    {watchlist.includes(stock.symbol) ? (
                                                                        <svg className="w-4 h-4 text-amber-400 fill-amber-400" viewBox="0 0 20 20" fill="currentColor">
                                                                            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                                                        </svg>
                                                                    ) : (
                                                                        <svg className="w-4 h-4 text-slate-600 hover:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.961 0 1.36 1.24.588 1.81l-3.97 2.883a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.971-2.883a1 1 0 00-1.175 0l-3.97 2.883c-.783.57-1.838-.197-1.539-1.118l1.518-4.674a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h4.906a1 1 0 00.951-.69l1.519-4.674z" />
                                                                        </svg>
                                                                    )}
                                                                </button>
                                                            </td>
                                                            <td className="py-3.5 px-3 font-bold text-slate-200">{stock.symbol}</td>
                                                            <td className="py-3.5 px-3 text-slate-400 text-sm">{stock.name}</td>
                                                            <td className="py-3.5 px-3 text-center font-extrabold text-slate-300">${stock.price.toFixed(2)}</td>
                                                            <td className={`py-3.5 px-3 text-right font-bold ${stock.changePercent >= 0 ? "text-emerald-400" : "text-rose-400"}`}>
                                                                {stock.changePercent >= 0 ? "+" : ""}{stock.changePercent.toFixed(2)}%
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* Trade Actions (1 Col) */}
                                <div className="glass-panel rounded-2xl p-6 border-t border-slate-800">
                                    <h2 className="text-lg font-bold text-indigo-300 mb-6 pb-2 border-b border-slate-800">Order Console</h2>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Asset Symbol</label>
                                            <select 
                                                value={selectedSymbol}
                                                onChange={(e) => setSelectedSymbol(e.target.value)}
                                                className="w-full px-4 py-2.5 bg-slate-900/60 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-200 font-bold"
                                            >
                                                {stocks.map(s => (
                                                    <option key={s.symbol} value={s.symbol} className="bg-slate-950">{s.symbol} - {s.name} (${s.price.toFixed(2)})</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Quantity (Shares)</label>
                                            <input 
                                                type="number"
                                                value={quantity}
                                                onChange={(e) => setQuantity(e.target.value)}
                                                className="w-full px-4 py-2.5 bg-slate-900/60 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-200 font-bold"
                                                min="1"
                                            />
                                        </div>
                                        
                                        {selectedSymbol && (
                                            <div className="bg-slate-950/40 p-3 rounded-xl border border-slate-900 text-xs text-slate-400 space-y-1">
                                                <div className="flex justify-between">
                                                    <span>Price per Share:</span>
                                                    <span className="font-bold text-slate-200">${(stocks.find(s => s.symbol === selectedSymbol)?.price || 0).toFixed(2)}</span>
                                                </div>
                                                <div className="flex justify-between border-t border-slate-900 pt-1 mt-1">
                                                    <span>Estimated Cost:</span>
                                                    <span className="font-bold text-indigo-400 text-sm">${((stocks.find(s => s.symbol === selectedSymbol)?.price || 0) * (parseInt(quantity) || 0)).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                                </div>
                                            </div>
                                        )}

                                        <div className="grid grid-cols-2 gap-4 pt-2">
                                            <button 
                                                onClick={() => handleTrade('BUY')}
                                                className="py-3 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-500 transition duration-200 shadow-lg shadow-emerald-600/20"
                                            >
                                                BUY
                                            </button>
                                            <button 
                                                onClick={() => handleTrade('SELL')}
                                                className="py-3 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-500 transition duration-200 shadow-lg shadow-rose-600/20"
                                            >
                                                SELL
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Line Chart Component at bottom of market view */}
                            {selectedSymbol && (
                                <div className="mb-4">
                                    <PriceChart 
                                        symbol={selectedSymbol} 
                                        prices={priceHistory[selectedSymbol]} 
                                    />
                                </div>
                            )}
                        </div>
                    )}

                    {/* Tab 2: Portfolio Analytics */}
                    {activeTab === 'analytics' && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* SVG Donut Allocation Chart */}
                            <div className="lg:col-span-1 flex flex-col gap-6">
                                <div className="glass-panel rounded-2xl p-6 border-t border-slate-800 h-full flex flex-col justify-between">
                                    <h2 className="text-lg font-bold text-indigo-300 pb-2 border-b border-slate-800 mb-4">Asset Allocation</h2>
                                    <AllocationDonutChart 
                                        cash={portfolio.cash} 
                                        holdings={portfolio.holdings} 
                                        stocks={stocks} 
                                    />
                                </div>
                            </div>

                            {/* Detailed Holdings list with ROI percentage */}
                            <div className="glass-panel rounded-2xl p-6 lg:col-span-2 border-t border-slate-800">
                                <h2 className="text-lg font-bold text-indigo-300 mb-6 pb-2 border-b border-slate-800">Holdings ROI Analysis</h2>
                                {portfolio.holdings.length === 0 ? (
                                    <div className="text-center py-16 text-slate-500 font-medium">
                                        No assets currently held. Execute buy orders in the market terminal to see ROI reports.
                                    </div>
                                ) : (
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="text-slate-400 font-semibold text-xs border-b border-slate-800/80 uppercase tracking-wider">
                                                    <th className="py-3 px-4">Asset</th>
                                                    <th className="py-3 px-4 text-center">Shares</th>
                                                    <th className="py-3 px-4 text-center">Avg Buy Cost</th>
                                                    <th className="py-3 px-4 text-center">Current Price</th>
                                                    <th className="py-3 px-4 text-center">Current Value</th>
                                                    <th className="py-3 px-4 text-right">Return on Investment (ROI)</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {portfolio.holdings.map((h) => {
                                                    const currentPrice = stocks.find(s => s.symbol === h.symbol)?.price || h.averageCost;
                                                    const totalCost = h.averageCost * h.sharesOwned;
                                                    const currentValue = currentPrice * h.sharesOwned;
                                                    const profit = currentValue - totalCost;
                                                    const roi = totalCost > 0 ? (profit / totalCost) * 100 : 0;
                                                    return (
                                                        <tr key={h.symbol} className="border-b border-slate-800/50 hover:bg-slate-800/30 transition">
                                                            <td className="py-4 px-4 font-bold text-slate-200">{h.symbol}</td>
                                                            <td className="py-4 px-4 text-center font-bold text-slate-300">{h.sharesOwned}</td>
                                                            <td className="py-4 px-4 text-center text-slate-400">${h.averageCost.toFixed(2)}</td>
                                                            <td className="py-4 px-4 text-center text-slate-300">${currentPrice.toFixed(2)}</td>
                                                            <td className="py-4 px-4 text-center font-bold text-slate-200">${currentValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                                                            <td className="py-4 px-4 text-right">
                                                                <div className={`font-extrabold text-sm ${profit >= 0 ? "text-emerald-400" : "text-rose-400"}`}>
                                                                    {profit >= 0 ? "+" : ""}${profit.toFixed(2)}
                                                                </div>
                                                                <div className={`text-[10px] font-bold ${profit >= 0 ? "text-emerald-500" : "text-rose-500"}`}>
                                                                    {profit >= 0 ? "+" : ""}{roi.toFixed(2)}%
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Tab 3: Transaction Audit Ledger */}
                    {activeTab === 'logs' && (
                        <div className="glass-panel rounded-2xl p-6 border-t border-slate-800">
                            <div className="flex justify-between items-center mb-6 pb-2 border-b border-slate-800">
                                <h2 className="text-lg font-bold text-indigo-300">Transaction Audit Ledger</h2>
                                <span className="text-xs bg-slate-900 text-slate-400 px-3 py-1 rounded-lg border border-slate-800 font-bold">Total: {transactions.length} orders</span>
                            </div>
                            {transactions.length === 0 ? (
                                <div className="text-slate-500 py-16 text-center text-sm font-medium">No transactions recorded in system audit logs.</div>
                            ) : (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="text-slate-400 font-semibold text-xs border-b border-slate-800/80 uppercase tracking-wider">
                                                <th className="py-3 px-4">Timestamp</th>
                                                <th className="py-3 px-4">Action</th>
                                                <th className="py-3 px-4">Symbol</th>
                                                <th className="py-3 px-4 text-center">Quantity</th>
                                                <th className="py-3 px-4 text-center">Execution Price</th>
                                                <th className="py-3 px-4 text-right">Total Invoice Value</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {transactions.slice().reverse().map((t) => {
                                                const totalValue = t.price * t.quantity;
                                                return (
                                                    <tr key={t.id} className="border-b border-slate-800/50 hover:bg-slate-800/30 transition text-sm">
                                                        <td className="py-3.5 px-4 text-slate-400 font-medium">{new Date(t.timestamp).toLocaleString()}</td>
                                                        <td className="py-3.5 px-4">
                                                            <span className={`px-2 py-0.5 rounded text-[10px] font-extrabold uppercase ${t.type === 'BUY' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}`}>
                                                                {t.type}
                                                            </span>
                                                        </td>
                                                        <td className="py-3.5 px-4 font-bold text-slate-200">{t.symbol}</td>
                                                        <td className="py-3.5 px-4 text-center font-bold text-slate-300">{t.quantity}</td>
                                                        <td className="py-3.5 px-4 text-center font-bold text-slate-400">${t.price.toFixed(2)}</td>
                                                        <td className={`py-3.5 px-4 text-right font-extrabold ${t.type === 'BUY' ? 'text-emerald-400/90' : 'text-rose-400/90'}`}>
                                                            {t.type === 'BUY' ? '-' : '+'}${totalValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
